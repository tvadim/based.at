<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>based.at — Sign Document</title>
  <meta name="description" content="Sign a document through based.at." />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0f12;
      --card: #0f151a;
      --muted: #91a6ad;
      --text: #e6f0f2;
      --accent: #00e5ff;
      --ring: rgba(0, 229, 255, .25);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 70% -10%, rgba(0,229,255,.12), transparent 60%),
        radial-gradient(1000px 500px at -10% 30%, rgba(0,229,255,.10), transparent 50%),
        linear-gradient(180deg, #0a0f12 0%, #0a0f12 100%);
      background-color: var(--bg);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(6px);
      background: linear-gradient(180deg, rgba(10,15,18,.8), rgba(10,15,18,.4));
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
    .cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    .btn {
      --shadow: 0 10px 30px rgba(0, 229, 255, .18);
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 18px; border-radius: 14px; font-weight: 600;
      background: linear-gradient(180deg, var(--accent) 0%, #00c9db 100%);
      color: #001317; border: none; box-shadow: var(--shadow);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.02); box-shadow: 0 12px 36px rgba(0, 229, 255, .24); }
    .btn.secondary {
      background: linear-gradient(180deg, #162228, #0f171c);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: none;
    }
    .btn.secondary:hover { border-color: rgba(255,255,255,.18); }

    main { padding: 46px 0 0; }
    .page-head {
      display: grid;
      gap: 10px;
      margin: 0 auto 24px;
      max-width: 760px;
      text-align: center;
    }
    .eyebrow {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.05;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: var(--muted);
      margin: 0;
    }

    .embed-shell {
      overflow: hidden;
      min-height: min(76vh, 860px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      box-shadow: 0 24px 80px rgba(0, 0, 0, .22);
    }
    .embed-shell iframe {
      display: block;
      width: 100%;
      height: min(76vh, 860px);
      min-height: 640px;
      border: 0;
      background: #fff;
    }

    footer { border-top: 1px solid rgba(255,255,255,.08); margin-top: 70px; }
    .foot { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; gap: 14px; flex-wrap: wrap; }
    .foot small { color: var(--muted); }

    @media (max-width: 720px) {
      .nav { align-items: flex-start; gap: 12px; flex-direction: column; }
      .cta { justify-content: flex-start; }
      main { padding-top: 34px; }
      .embed-shell,
      .embed-shell iframe {
        min-height: 680px;
        height: 78vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="/" aria-label="based.at home">
        <img src="/img/basedat.png" alt="based.at" width="138" />
      </a>
      <div class="cta">
        <a class="btn secondary" href="/">Home</a>
        <a class="btn" href="mailto:hello@based.at">Contact</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="page-head" aria-labelledby="page-title">
      <p class="eyebrow">Secure workflow</p>
      <h1 id="page-title">Sign Document</h1>
      <p class="sub">Complete the signing flow below without leaving based.at.</p>
    </section>

    <section class="embed-shell" aria-label="Document signing frame">
      <iframe
        title="Sign document"
        src="https://feature.sign2x.com/embed/sign-document/a1fcec0c67eb8f64c1269ccf79fdd92cf930edc96d0e86cb0b70b801fcc13995"
        referrerpolicy="no-referrer"
        allow="clipboard-write; fullscreen"
        allowfullscreen>
      </iframe>
    </section>
  </main>

  <footer>
    <div class="container foot">
      <div></div>
      <small>© 2025 based.at — All rights reserved.</small>
    </div>
  </footer>
</body>
</html>
